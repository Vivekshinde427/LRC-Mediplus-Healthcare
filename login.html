<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LRC Medi+ Healthcare</title>
    <meta name="description" content="Log in to your LRC Medi+ Healthcare account to track your orders, rentals, and manage your profile.">
    <meta name="robots" content="noindex, nofollow">
    <!-- Apply theme before CSS loads to prevent flash -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('lrc-theme') || 'light');</script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <!-- Utilities injected by JS -->
    <div id="utilsContainer"></div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <img src="images/main-logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                </a>
                <h2>Welcome Back</h2>
                <p>Login to your account to continue</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <div class="form-icon-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email">
                    </div>
                    <span class="form-error"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="form-icon-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
                        <span class="password-toggle" onclick="togglePasswordVisibility('loginPassword')">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                    <span class="form-error"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block mb-md">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register Now</a></p>
                <p class="mt-md"><a href="index.html" class="text-muted"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('utilsContainer').innerHTML = getToastContainerHTML() + getLoaderHTML();
            initTheme();
            
            // Redirect if already logged in
            auth.onAuthStateChanged(user => {
                if (user) {
                    window.location.href = isAdmin(user.email) ? 'admin.html' : 'index.html';
                }
            });
        });
    </script>
</body>
</html>
